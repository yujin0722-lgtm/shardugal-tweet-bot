name: シャードゥーガル ツイート収集

on:
  schedule:
    # UTC 03:00 = 日本時間 12:00
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ツイートを取得してNotionに書き込む
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python fetch_and_push.py

      - name: 状態ファイルをコミット
        run: |
          git config user.name "shardugal-tweet-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json run_log.txt
          git diff --cached --quiet || git commit -m "状態を更新"
          git push
